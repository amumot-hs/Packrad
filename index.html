<!DOCTYPE html>
<html lang="de">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0d0f13;--card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.06);
--text:#e8e8e8;--text2:#888;--text3:#666;--accent:#E8594F;--accent2:#D94590;--green:#00B894;
--input-bg:#23272f;--input-border:rgba(255,255,255,0.1);
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:inherit}
input[type="text"],input[type="number"],select,textarea{
background:var(--input-bg);border:1px solid var(--input-border);border-radius:10px;
padding:10px 14px;color:var(--text);font-size:14px;width:100%;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--accent)}
select{-webkit-appearance:none;appearance:auto}
.btn-primary{
background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);color:#fff;
border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer}
.btn-ghost{
background:rgba(255,255,255,0.06);color:#ccc;border:1px solid var(--border);
border-radius:10px;padding:8px 14px;font-size:13px;cursor:pointer}
.btn-ghost:active,.btn-primary:active{opacity:.7;transform:scale(.97)}
.modal-overlay{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;
background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:#1a1d24;border-radius:16px;padding:28px;width:90%;max-width:420px;
box-shadow:0 24px 80px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.08);
transform:translateY(20px);transition:transform .2s;max-height:85vh;overflow-y:auto}
.modal-overlay.open .modal-box{transform:translateY(0)}
.cat-card{margin-bottom:12px;border-radius:16px;overflow:hidden;background:var(--card);border:1px solid var(--border);transition:opacity .3s}
.cat-card.disabled{opacity:.45}
.cat-header{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.04)}
.item-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.02)}
.check-cat{width:22px;height:22px;border-radius:6px;border:2px solid #444;background:transparent;
cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;flex-shrink:0;transition:all .15s}
.check-cat.on{border-color:var(--accent);background:var(--accent)}
.check-item{width:20px;height:20px;border-radius:50%;border:2px solid #444;background:transparent;
cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;flex-shrink:0;transition:all .15s}
.check-item.on{border-color:var(--green);background:var(--green)}
.loc-tag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;white-space:nowrap;display:inline-block;margin-top:3px}
.stat-box{background:var(--card);border-radius:14px;padding:12px 10px;border:1px solid var(--border);text-align:center}
.tab-bar{display:flex;gap:4px;background:var(--card);border-radius:12px;padding:3px;margin-bottom:14px}
.tab-btn{flex:1;padding:8px 0;border-radius:10px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--text2)}
.tab-btn.active{background:rgba(232,89,79,0.2);color:var(--accent)}
.loc-card{margin-bottom:12px;border-radius:14px;overflow:hidden;background:var(--card);border:1px solid var(--border)}
.loc-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.04)}
.bike-loc-card{background:var(--card);border-radius:12px;padding:10px 12px;border:1px solid var(--border)}
.autocomplete{position:absolute;top:100%;left:0;right:0;z-index:50;background:#1e2129;border:1px solid var(--border);border-radius:0 0 10px 10px;
max-height:200px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.autocomplete-item{padding:10px 14px;font-size:13px;color:#ccc;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.03)}
.autocomplete-item:active,.autocomplete-item:hover{background:rgba(232,89,79,0.15);color:#fff}
.autocomplete-item .ac-cat{font-size:10px;color:var(--text3);margin-left:6px}
.autocomplete-item .ac-weight{font-size:11px;color:var(--text2);float:right}
.weight-display{font-size:13px;font-weight:700;color:var(--text2);white-space:nowrap;text-align:right;min-width:55px}
.weight-unit{font-weight:500;font-size:11px;color:var(--text3);margin-left:1px}
@media(max-width:380px){.stat-box{padding:10px 6px}.stat-box .val{font-size:17px!important}}

.bike-image-wrap{position:relative;width:100%;aspect-ratio:640/380;border-radius:14px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01))}
.bike-image-wrap img{width:100%;height:100%;object-fit:contain;display:block}
.bike-marker{position:absolute;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;border-radius:999px;color:#fff;
font-size:10px;font-weight:800;line-height:1;backdrop-filter:blur(2px);box-shadow:0 8px 22px rgba(0,0,0,0.32), inset 0 0 0 1px rgba(255,255,255,0.16);
border:1px solid rgba(255,255,255,0.18);text-shadow:0 1px 2px rgba(0,0,0,0.45);white-space:nowrap;padding:0 4px}
.bike-marker-label{position:absolute;transform:translate(-50%,-50%);font-size:9px;font-weight:700;line-height:1;color:#f5f5f5;text-shadow:0 1px 2px rgba(0,0,0,0.85);white-space:nowrap;
background:rgba(0,0,0,0.42);border:1px solid rgba(255,255,255,0.08);padding:3px 6px;border-radius:999px;backdrop-filter:blur(3px)}
.bike-marker.driver{top:4.5%!important;left:50%!important}
.bike-marker-label.driver{top:1.7%!important;left:50%!important}

</style>
</head>

// ── State ──
let state={
  categories:null,
  locations:null,
  locColors:null,
  view:'list',
  search:'',
  searchFocused:false,
  bikeWeight:18600,
  bodyWeight:63000,
  modal:null,
  newItem:{name:'',weight:'',location:''},
  newCatName:'',
  newLocName:'',
};

function loadState(){
  try{
    const s=localStorage.getItem('packrad-data');
    if(s){const d=JSON.parse(s);state.categories=d.categories||JSON.parse(JSON.stringify(DEFAULT_DATA));state.locations=d.locations||[...DEFAULT_LOCATIONS];state.locColors=d.locColors||{...DEFAULT_LOC_COLORS};state.bikeWeight=d.bikeWeight||18600;state.bodyWeight=d.bodyWeight||63000;return}
  }catch(e){}
  state.categories=JSON.parse(JSON.stringify(DEFAULT_DATA));
  state.locations=[...DEFAULT_LOCATIONS];
  state.locColors={...DEFAULT_LOC_COLORS};
}
function saveState(){
  try{localStorage.setItem('packrad-data',JSON.stringify({categories:state.categories,locations:state.locations,locColors:state.locColors,bikeWeight:state.bikeWeight,bodyWeight:state.bodyWeight}))}catch(e){}
}
function uid(){return 'id-'+Math.random().toString(36).slice(2,9)}
function fmtW(g){if(g>=1000)return '<span>'+(g/1000).toFixed(1)+'</span><span class="weight-unit"> kg</span>';return '<span>'+g+'</span><span class="weight-unit"> g</span>'}
function fmtWPlain(g){return g>=1000?(g/1000).toFixed(1)+' kg':g+' g'}
function getLocColor(loc){return state.locColors[loc]||'#888'}
function assignLocColor(loc){
  if(state.locColors[loc])return;
  const used=Object.values(state.locColors);
  const avail=EXTRA_COLORS.filter(c=>!used.includes(c));
  state.locColors[loc]=avail.length?avail[0]:EXTRA_COLORS[Math.floor(Math.random()*EXTRA_COLORS.length)];
}

// ── Compute ──
function getEnabledCats(){return state.categories.filter(c=>c.enabled)}
function getTotalWeight(){return getEnabledCats().reduce((s,c)=>s+c.items.filter(i=>i.packed).reduce((a,i)=>a+(i.weight||0),0),0)}
function getTotalPacked(){return getEnabledCats().reduce((s,c)=>s+c.items.filter(i=>i.packed).length,0)}
function getAllItemsCount(){return state.categories.reduce((s,c)=>s+c.items.length,0)}
function getLocationWeights(){const lw={};getEnabledCats().forEach(c=>c.items.filter(i=>i.packed).forEach(i=>{lw[i.location]=(lw[i.location]||0)+(i.weight||0)}));return lw}
function getLocationItems(){const li={};getEnabledCats().forEach(c=>c.items.filter(i=>i.packed).forEach(i=>{if(!li[i.location])li[i.location]=[];li[i.location].push({...i,category:c.name})}));return li}
function getAllItems(){const all=[];state.categories.forEach(c=>c.items.forEach(i=>all.push({...i,category:c.name,catId:c.id})));return all}

// ── Search / Autocomplete ──
function getSearchSuggestions(q){
  if(!q)return[];
  const ql=q.toLowerCase();
  return getAllItems().filter(i=>i.name.toLowerCase().includes(ql)).slice(0,8);
}

// ── Actions ──
function togglePacked(catId,itemId){const c=state.categories.find(c=>c.id===catId);if(!c)return;const i=c.items.find(i=>i.id===itemId);if(i)i.packed=!i.packed;saveState();render()}
function toggleCategory(catId){const c=state.categories.find(c=>c.id===catId);if(c)c.enabled=!c.enabled;saveState();render()}
function packAll(catId){const c=state.categories.find(c=>c.id===catId);if(c)c.items.forEach(i=>i.packed=true);saveState();render()}
function unpackAll(catId){const c=state.categories.find(c=>c.id===catId);if(c)c.items.forEach(i=>i.packed=false);saveState();render()}
function addItem(){const n=state.newItem;if(!n.name.trim())return;const c=state.categories.find(c=>c.id===state.modal.catId);if(!c)return;c.items.push({id:uid(),name:n.name.trim(),weight:parseInt(n.weight)||0,location:n.location||state.locations[0],packed:false});state.newItem={name:'',weight:'',location:state.locations[0]};state.modal=null;saveState();render()}
function addCategory(){if(!state.newCatName.trim())return;state.categories.push({id:uid(),name:state.newCatName.trim(),enabled:true,items:[]});state.newCatName='';state.modal=null;saveState();render()}
function deleteItem(catId,itemId){const c=state.categories.find(c=>c.id===catId);if(!c)return;c.items=c.items.filter(i=>i.id!==itemId);saveState();render()}
function deleteCategory(catId){state.categories=state.categories.filter(c=>c.id!==catId);saveState();render()}
function saveEditItem(){const m=state.modal;if(!m||!m.item)return;const c=state.categories.find(c=>c.id===m.catId);if(!c)return;const it=c.items.find(i=>i.id===m.item.id);if(!it)return;it.name=m.item.name;it.weight=m.item.weight;it.location=m.item.location;state.modal=null;saveState();render()}
function addLocation(){if(!state.newLocName.trim())return;const name=state.newLocName.trim();if(state.locations.includes(name)){alert('Ort existiert bereits');return}state.locations.push(name);assignLocColor(name);state.newLocName='';saveState();render()}
function deleteLocation(loc){if(!confirm("Ort '"+loc+"' löschen? Gegenstände mit diesem Ort werden auf '"+state.locations[0]+"' umgestellt."))return;state.categories.forEach(c=>c.items.forEach(i=>{if(i.location===loc)i.location=state.locations[0]}));state.locations=state.locations.filter(l=>l!==loc);delete state.locColors[loc];saveState();render()}
function resetData(){if(!confirm('Alle Daten zurücksetzen auf Werkszustand?'))return;state.categories=JSON.parse(JSON.stringify(DEFAULT_DATA));state.locations=[...DEFAULT_LOCATIONS];state.locColors={...DEFAULT_LOC_COLORS};saveState();render()}
function exportJSON(){const blob=new Blob([JSON.stringify({categories:state.categories,locations:state.locations,locColors:state.locColors,bikeWeight:state.bikeWeight,bodyWeight:state.bodyWeight},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='packrad-backup.json';a.click()}
function importJSON(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);state.categories=d.categories||state.categories;state.locations=d.locations||state.locations;state.locColors=d.locColors||state.locColors;state.bikeWeight=d.bikeWeight||state.bikeWeight;state.bodyWeight=d.bodyWeight||state.bodyWeight;saveState();render()}catch(e){alert('Ungültige Datei')}};r.readAsText(f)};inp.click()}
function selectSuggestion(name){state.search=name;state.searchFocused=false;render()}
function clearSearch(){state.search='';state.searchFocused=false;render()}

// ── Helpers ──
function locOptions(sel){return state.locations.map(l=>`<option value="${esc(l)}"${l===sel?' selected':''}>${esc(l)}</option>`).join('')}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escAttr(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;')}

// ── Modal HTML ──
function modalHTML(){
  const m=state.modal;if(!m)return '<div class="modal-overlay" id="modal"></div>';
  let inner='';
  const closeBtn='<button onclick="state.modal=null;render()" style="background:none;border:none;color:#888;font-size:22px;cursor:pointer;padding:4px">✕</button>';

  if(m.type==='addItem'){
    inner=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
<h3 style="font-size:17px;font-weight:700;color:#f0f0f0">Gegenstand hinzufügen</h3>${closeBtn}</div>
<div style="display:flex;flex-direction:column;gap:12px">
<input id="mi-name" type="text" placeholder="Name" value="${esc(state.newItem.name)}">
<input id="mi-weight" type="number" placeholder="Gewicht in Gramm" value="${state.newItem.weight}" inputmode="numeric">
<select id="mi-loc">${locOptions(state.newItem.location||state.locations[0])}</select>
<button class="btn-primary" onclick="syncNewItem();addItem()">Hinzufügen</button></div>`;
  } else if(m.type==='addCat'){
    inner=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
<h3 style="font-size:17px;font-weight:700;color:#f0f0f0">Neue Kategorie</h3>${closeBtn}</div>
<div style="display:flex;flex-direction:column;gap:12px">
<input id="mc-name" type="text" placeholder="Kategoriename" value="${esc(state.newCatName)}">
<button class="btn-primary" onclick="state.newCatName=document.getElementById('mc-name').value;addCategory()">Erstellen</button></div>`;
  } else if(m.type==='editItem'&&m.item){
    inner=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
<h3 style="font-size:17px;font-weight:700;color:#f0f0f0">Gegenstand bearbeiten</h3>${closeBtn}</div>
<div style="display:flex;flex-direction:column;gap:12px">
<input id="me-name" type="text" value="${esc(m.item.name)}">
<input id="me-weight" type="number" value="${m.item.weight}" inputmode="numeric">
<select id="me-loc">${locOptions(m.item.location)}</select>
<button class="btn-primary" onclick="syncEditItem();saveEditItem()">Speichern</button></div>`;
  } else if(m.type==='locations'){
    let locList='';
    state.locations.forEach((loc,i)=>{
      const col=getLocColor(loc);
      const isDefault=DEFAULT_LOCATIONS.includes(loc);
      locList+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
<div style="width:14px;height:14px;border-radius:4px;background:${col};flex-shrink:0"></div>
<div style="flex:1;font-size:13px;color:#ddd">${esc(loc)}</div>
${isDefault?'':'<button onclick="deleteLocation(\''+escAttr(loc)+'\')" style="background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer;padding:4px">✕</button>'}
</div>`;
    });
    inner=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
<h3 style="font-size:17px;font-weight:700;color:#f0f0f0">Packorte verwalten</h3>${closeBtn}</div>
<div style="max-height:300px;overflow-y:auto;margin-bottom:16px">${locList}</div>
<div style="display:flex;gap:8px">
<input id="ml-name" type="text" placeholder="Neuer Packort / Tasche..." value="${esc(state.newLocName)}" style="flex:1">
<button class="btn-primary" style="padding:10px 16px;white-space:nowrap" onclick="state.newLocName=document.getElementById('ml-name').value;addLocation()">+</button>
</div>`;
  }
  return `<div class="modal-overlay open" id="modal" onclick="if(event.target===this){state.modal=null;render()}"><div class="modal-box" onclick="event.stopPropagation()">${inner}</div></div>`;
}

function syncNewItem(){
  state.newItem.name=document.getElementById('mi-name')?.value||'';
  state.newItem.weight=document.getElementById('mi-weight')?.value||'';
  state.newItem.location=document.getElementById('mi-loc')?.value||state.locations[0];
}
function syncEditItem(){
  if(!state.modal||!state.modal.item)return;
  state.modal.item.name=document.getElementById('me-name')?.value||'';
  state.modal.item.weight=parseInt(document.getElementById('me-weight')?.value)||0;
  state.modal.item.location=document.getElementById('me-loc')?.value||state.locations[0];
}

// ── Main Render ──
function render(){
  const tw=getTotalWeight(),tp=getTotalPacked(),ai=getAllItemsCount();
  const lw=getLocationWeights(),li=getLocationItems();
  const total=tw+state.bikeWeight+state.bodyWeight;
  const search=state.search.toLowerCase();
  const suggestions=state.searchFocused?getSearchSuggestions(state.search):[];

  let cats=state.categories;
  if(search){
    cats=cats.map(c=>({...c,items:c.items.filter(i=>i.name.toLowerCase().includes(search))})).filter(c=>c.items.length>0);
  }

  let html=`<div style="max-width:480px;margin:0 auto;position:relative;padding-bottom:env(safe-area-inset-bottom)">
<div style="position:absolute;top:-120px;right:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(232,89,79,0.12) 0%,transparent 70%);pointer-events:none"></div>
<div style="padding:20px 20px 0;position:relative;z-index:1">

<!-- Header -->
<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
<span style="font-size:26px">🚲</span>
<h1 style="font-size:24px;font-weight:800;letter-spacing:-0.04em;background:linear-gradient(135deg,#E8594F,#F39C12);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">PackRad</h1>
</div>
<p style="margin:2px 0 16px;font-size:12px;color:#666;letter-spacing:0.08em;text-transform:uppercase">Bikepacking Packliste</p>

<!-- Stats -->
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
<div class="stat-box"><div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Gepäck</div><div class="val" style="font-size:20px;font-weight:800;letter-spacing:-0.03em">${(tw/1000).toFixed(1)} kg</div><div style="font-size:10px;color:var(--text3);margin-top:2px">${tp} / ${ai}</div></div>
<div class="stat-box"><div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Fahrrad</div><div class="val" style="font-size:20px;font-weight:800;letter-spacing:-0.03em">${(state.bikeWeight/1000).toFixed(1)} kg</div></div>
<div class="stat-box"><div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Gesamt</div><div class="val" style="font-size:20px;font-weight:800;letter-spacing:-0.03em;color:var(--accent)">${(total/1000).toFixed(1)} kg</div><div style="font-size:10px;color:var(--text3);margin-top:2px">mit Fahrer</div></div>
</div>

<!-- Tabs -->
<div class="tab-bar">
<button class="tab-btn ${state.view==='list'?'active':''}" onclick="state.view='list';render()">📋 Liste</button>
<button class="tab-btn ${state.view==='bike'?'active':''}" onclick="state.view='bike';render()">🚲 Rad</button>
<button class="tab-btn ${state.view==='locations'?'active':''}" onclick="state.view='locations';render()">📍 Orte</button>
</div>

<!-- Search with Autocomplete -->
<div style="position:relative;margin-bottom:12px">
<span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:#666;z-index:2">🔍</span>
${state.search?'<button onclick="clearSearch()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#888;font-size:18px;cursor:pointer;z-index:2;padding:4px">✕</button>':''}
<input type="text" id="search-input" placeholder="Gegenstand suchen..." value="${esc(state.search)}" style="padding-left:36px;${state.search?'padding-right:36px':''}"
onfocus="state.searchFocused=true;renderAutocomplete()"
onblur="setTimeout(function(){state.searchFocused=false;renderAutocomplete()},200)"
oninput="state.search=this.value;state.searchFocused=true;renderAutocomplete();renderFilteredList()">
<div id="autocomplete-box"></div>
</div>
</div>`;

  // ═══ LIST VIEW ═══
  if(state.view==='list'){
    html+='<div id="list-content" style="padding:0 20px 100px">';
    html+=renderListContent(cats);
    html+=`<button class="btn-primary" style="width:100%;padding:14px;font-size:15px;border-radius:14px;margin-top:8px" onclick="state.modal={type:'addCat'};render()">+ Neue Kategorie</button>`;
    html+=`<div style="text-align:center;margin-top:16px"><button class="btn-ghost" style="font-size:12px" onclick="state.modal={type:'locations'};render()">📍 Packorte verwalten</button></div>`;
    html+=`<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:16px;padding-bottom:20px">
<button class="btn-ghost" style="font-size:12px" onclick="exportJSON()">💾 Backup</button>
<button class="btn-ghost" style="font-size:12px" onclick="importJSON()">📂 Import</button>
<button class="btn-ghost" style="font-size:12px;color:var(--accent)" onclick="resetData()">🔄 Reset</button></div>`;
    html+='</div>';
  }

  // ═══ BIKE VIEW ═══
  if(state.view==='bike'){
    html+=`<div style="padding:0 20px 100px">
<div style="background:var(--card);border-radius:16px;padding:16px;border:1px solid var(--border);margin-bottom:16px">${bikeSVG(lw)}</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;
    state.locations.forEach(loc=>{
      const w=lw[loc]||0;const items=li[loc]||[];if(!w)return;
      const col=getLocColor(loc);
      html+=`<div class="bike-loc-card" style="border-left:3px solid ${col}">
<div style="font-size:11px;font-weight:700;color:${col};margin-bottom:4px">${esc(loc)}</div>
<div style="font-size:16px;font-weight:800;color:#f0f0f0;margin-bottom:4px">${(w/1000).toFixed(1)} kg</div>
<div style="font-size:10px;color:var(--text2)">${items.length} ${items.length===1?'Teil':'Teile'}</div></div>`;
    });
    html+=`</div>
<div style="margin-top:20px;display:flex;gap:10px">
<div style="flex:1"><label style="font-size:11px;color:var(--text2);display:block;margin-bottom:4px">Fahrradgewicht (g)</label>
<input type="number" id="bike-w" value="${state.bikeWeight}" inputmode="numeric" onchange="state.bikeWeight=parseInt(this.value)||0;saveState();render()"></div>
<div style="flex:1"><label style="font-size:11px;color:var(--text2);display:block;margin-bottom:4px">Körpergewicht (g)</label>
<input type="number" id="body-w" value="${state.bodyWeight}" inputmode="numeric" onchange="state.bodyWeight=parseInt(this.value)||0;saveState();render()"></div>
</div></div>`;
  }

  // ═══ LOCATIONS VIEW ═══
  if(state.view==='locations'){
    html+='<div style="padding:0 20px 100px">';
    state.locations.forEach(loc=>{
      const items=li[loc]||[];if(!items.length)return;const w=lw[loc]||0;const col=getLocColor(loc);
      html+=`<div class="loc-card"><div class="loc-header" style="border-left:4px solid ${col}">
<div><div style="font-weight:700;font-size:14px;color:${col}">${esc(loc)}</div><div style="font-size:11px;color:var(--text2)">${items.length} Teile</div></div>
<div style="font-size:18px;font-weight:800;color:#f0f0f0">${(w/1000).toFixed(1)} kg</div></div>`;
      items.forEach(it=>{
        html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,0.02)">
<div><div style="font-size:13px;color:#ddd">${esc(it.name)}</div><div style="font-size:10px;color:#666">${esc(it.category)}</div></div>
<div class="weight-display">${fmtW(it.weight)}</div></div>`;
      });
      html+='</div>';
    });
    html+='</div>';
  }

  html+='</div>';
  html+=modalHTML();
  document.getElementById('app').innerHTML=html;

  // Focus modal input
  if(state.modal){setTimeout(()=>{const f=document.getElementById('mi-name')||document.getElementById('mc-name')||document.getElementById('me-name')||document.getElementById('ml-name');if(f)f.focus()},50)}
}

function renderListContent(cats){
  let html='';
  cats.forEach(cat=>{
    const cw=cat.items.filter(i=>i.packed).reduce((a,i)=>a+(i.weight||0),0);
    const cp=cat.items.filter(i=>i.packed).length;
    html+=`<div class="cat-card ${cat.enabled?'':'disabled'}">
<div class="cat-header">
<button class="check-cat ${cat.enabled?'on':''}" onclick="toggleCategory('${cat.id}')">${cat.enabled?'✓':''}</button>
<div style="flex:1"><div style="font-weight:700;font-size:14px;letter-spacing:-0.01em">${esc(cat.name)}</div>
<div style="font-size:11px;color:var(--text2);margin-top:1px">${cp}/${cat.items.length} gepackt · ${(cw/1000).toFixed(1)} kg</div></div>
<div style="display:flex;gap:4px">
<button class="btn-ghost" style="padding:4px 8px;font-size:11px" onclick="packAll('${cat.id}')">✓</button>
<button class="btn-ghost" style="padding:4px 8px;font-size:11px" onclick="unpackAll('${cat.id}')">✗</button>
<button class="btn-ghost" style="padding:4px 8px;font-size:14px" onclick="state.modal={type:'addItem',catId:'${cat.id}'};render()">+</button>
<button class="btn-ghost" style="padding:4px 8px;font-size:12px;color:var(--accent)" onclick="if(confirm('Kategorie \\'${escAttr(cat.name)}\\' löschen?'))deleteCategory('${cat.id}')">🗑</button>
</div></div>`;
    cat.items.forEach(it=>{
      const col=getLocColor(it.location);
      html+=`<div class="item-row">
<button class="check-item ${it.packed?'on':''}" onclick="togglePacked('${cat.id}','${it.id}')">${it.packed?'✓':''}</button>
<div style="flex:1;min-width:0;cursor:pointer" onclick="state.modal={type:'editItem',catId:'${cat.id}',item:{id:'${it.id}',name:'${escAttr(it.name)}',weight:${it.weight},location:'${escAttr(it.location)}'}};render()">
<div style="font-size:13px;font-weight:500;color:${it.packed?'#e8e8e8':'#999'}">${esc(it.name)}</div>
<span class="loc-tag" style="background:${col}22;color:${col}">${esc(it.location)}</span>
</div>
<div class="weight-display">${fmtW(it.weight)}</div>
<button onclick="if(confirm('${escAttr(it.name)} löschen?'))deleteItem('${cat.id}','${it.id}')" style="background:none;border:none;color:#555;font-size:14px;cursor:pointer;padding:2px 4px">×</button>
</div>`;
    });
    html+='</div>';
  });
  return html;
}

function renderAutocomplete(){
  const box=document.getElementById('autocomplete-box');
  if(!box)return;
  const suggestions=state.searchFocused?getSearchSuggestions(state.search):[];
  if(!suggestions.length||!state.search){box.innerHTML='';return}
  let h='<div class="autocomplete">';
  suggestions.forEach(s=>{
    h+=`<div class="autocomplete-item" onmousedown="selectSuggestion('${escAttr(s.name)}')">
${esc(s.name)}<span class="ac-cat">${esc(s.category)}</span>
<span class="ac-weight">${fmtWPlain(s.weight)}</span></div>`;
  });
  h+='</div>';
  box.innerHTML=h;
}

function renderFilteredList(){
  const el=document.getElementById('list-content');
  if(!el||state.view!=='list')return;
  const search=state.search.toLowerCase();
  let cats=state.categories;
  if(search){cats=cats.map(c=>({...c,items:c.items.filter(i=>i.name.toLowerCase().includes(search))})).filter(c=>c.items.length>0)}
  // Only update the list part, keep buttons
  const listCards=el.querySelectorAll('.cat-card');
  // Full re-render of list section for simplicity
  const btnHtml=el.innerHTML.substring(el.innerHTML.lastIndexOf('<button class="btn-primary"'));
  // Actually just do render autocomplete separately
  renderAutocomplete();
}

// ── Init ──
loadState();
render();

// Close autocomplete on scroll
document.addEventListener('scroll',()=>{state.searchFocused=false;renderAutocomplete()},true);
</script>
</body>
</html>
