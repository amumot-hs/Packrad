*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0d0f13;--card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.06);
--text:#e8e8e8;--text2:#888;--text3:#666;--accent:#E8594F;--accent2:#D94590;--green:#00B894;
--input-bg:#23272f;--input-border:rgba(255,255,255,0.1);
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
input,select,button{font-family:inherit}
input[type="text"],input[type="number"],select{
background:var(--input-bg);border:1px solid var(--input-border);border-radius:10px;
padding:10px 14px;color:var(--text);font-size:14px;width:100%;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--accent)}
select{-webkit-appearance:none;appearance:auto}
.btn-primary{
background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);color:#fff;
border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer}
.btn-ghost{
background:rgba(255,255,255,0.06);color:#ccc;border:1px solid var(--border);
border-radius:10px;padding:8px 14px;font-size:13px;cursor:pointer}
.btn-ghost:active,.btn-primary:active{opacity:.7;transform:scale(.97)}
.modal-overlay{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;
background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:#1a1d24;border-radius:16px;padding:28px;width:90%;max-width:420px;
box-shadow:0 24px 80px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.08);
transform:translateY(20px);transition:transform .2s}
.modal-overlay.open .modal-box{transform:translateY(0)}
.cat-card{margin-bottom:12px;border-radius:16px;overflow:hidden;background:var(--card);border:1px solid var(--border);transition:opacity .3s}
.cat-card.disabled{opacity:.45}
.cat-header{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.04)}
.item-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.02)}
.check-cat{width:22px;height:22px;border-radius:6px;border:2px solid #444;background:transparent;
cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;flex-shrink:0;transition:all .15s}
.check-cat.on{border-color:var(--accent);background:var(--accent)}
.check-item{width:20px;height:20px;border-radius:50%;border:2px solid #444;background:transparent;
cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;flex-shrink:0;transition:all .15s}
.check-item.on{border-color:var(--green);background:var(--green)}
.loc-tag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;white-space:nowrap;display:inline-block;margin-top:3px}
.stat-box{background:var(--card);border-radius:14px;padding:12px 10px;border:1px solid var(--border);text-align:center}
.tab-bar{display:flex;gap:4px;background:var(--card);border-radius:12px;padding:3px;margin-bottom:14px}
.tab-btn{flex:1;padding:8px 0;border-radius:10px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--text2)}
.tab-btn.active{background:rgba(232,89,79,0.2);color:var(--accent)}
.loc-card{margin-bottom:12px;border-radius:14px;overflow:hidden;background:var(--card);border:1px solid var(--border)}
.loc-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.04)}
.bike-loc-card{background:var(--card);border-radius:12px;padding:10px 12px;border:1px solid var(--border)}
.export-section{padding:20px;margin-top:8px;border-top:1px solid var(--border)}
@media(max-width:380px){.stat-box{padding:10px 6px}.stat-box .val{font-size:17px!important}}
</style>

// ── State ──
let state={
  categories:null,
  view:'list',
  search:'',
  bikeWeight:18600,
  bodyWeight:63000,
  modal:null, // {type,catId,item}
  newItem:{name:'',weight:'',location:PACK_LOCATIONS[0]},
  newCatName:'',
  expandedCats:{}, // track collapsed categories
};

function loadState(){
  try{
    const s=localStorage.getItem('packrad-data');
    if(s){state.categories=JSON.parse(s);return}
  }catch(e){}
  state.categories=JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function saveState(){
  try{localStorage.setItem('packrad-data',JSON.stringify(state.categories))}catch(e){}
}
function uid(){return 'id-'+Math.random().toString(36).slice(2,9)}
function fmtW(g){return g>=1000?(g/1000).toFixed(1)+' kg':g+' g'}

// ── Compute helpers ──
function getEnabledCats(){return state.categories.filter(c=>c.enabled)}
function getTotalWeight(){return getEnabledCats().reduce((s,c)=>s+c.items.filter(i=>i.packed).reduce((a,i)=>a+(i.weight||0),0),0)}
function getTotalPacked(){return getEnabledCats().reduce((s,c)=>s+c.items.filter(i=>i.packed).length,0)}
function getAllItemsCount(){return state.categories.reduce((s,c)=>s+c.items.length,0)}
function getLocationWeights(){
  const lw={};
  getEnabledCats().forEach(c=>c.items.filter(i=>i.packed).forEach(i=>{lw[i.location]=(lw[i.location]||0)+(i.weight||0)}));
  return lw;
}
function getLocationItems(){
  const li={};
  getEnabledCats().forEach(c=>c.items.filter(i=>i.packed).forEach(i=>{
    if(!li[i.location])li[i.location]=[];
    li[i.location].push({...i,category:c.name});
  }));
  return li;
}

// ── Actions ──
function togglePacked(catId,itemId){
  const c=state.categories.find(c=>c.id===catId);if(!c)return;
  const i=c.items.find(i=>i.id===itemId);if(i)i.packed=!i.packed;
  saveState();render();
}
function toggleCategory(catId){
  const c=state.categories.find(c=>c.id===catId);if(c)c.enabled=!c.enabled;
  saveState();render();
}
function packAll(catId){
  const c=state.categories.find(c=>c.id===catId);if(c)c.items.forEach(i=>i.packed=true);
  saveState();render();
}
function unpackAll(catId){
  const c=state.categories.find(c=>c.id===catId);if(c)c.items.forEach(i=>i.packed=false);
  saveState();render();
}
function addItem(){
  const n=state.newItem;if(!n.name.trim())return;
  const c=state.categories.find(c=>c.id===state.modal.catId);if(!c)return;
  c.items.push({id:uid(),name:n.name.trim(),weight:parseInt(n.weight)||0,location:n.location,packed:false});
  state.newItem={name:'',weight:'',location:PACK_LOCATIONS[0]};state.modal=null;
  saveState();render();
}
function addCategory(){
  if(!state.newCatName.trim())return;
  state.categories.push({id:uid(),name:state.newCatName.trim(),enabled:true,items:[]});
  state.newCatName='';state.modal=null;
  saveState();render();
}
function deleteItem(catId,itemId){
  const c=state.categories.find(c=>c.id===catId);if(!c)return;
  c.items=c.items.filter(i=>i.id!==itemId);
  saveState();render();
}
function deleteCategory(catId){
  state.categories=state.categories.filter(c=>c.id!==catId);
  saveState();render();
}
function saveEditItem(){
  const m=state.modal;if(!m||!m.item)return;
  const c=state.categories.find(c=>c.id===m.catId);if(!c)return;
  const it=c.items.find(i=>i.id===m.item.id);if(!it)return;
  it.name=m.item.name;it.weight=m.item.weight;it.location=m.item.location;
  state.modal=null;saveState();render();
}
function resetData(){
  if(!confirm('Alle Daten zurücksetzen auf Werkszustand?'))return;
  state.categories=JSON.parse(JSON.stringify(DEFAULT_DATA));
  saveState();render();
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(state.categories,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='packrad-backup.json';a.click();
}
function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{
      try{state.categories=JSON.parse(ev.target.result);saveState();render()}catch(e){alert('Ungültige Datei')}
    };r.readAsText(f);
  };inp.click();
}

// ── Bike SVG ──
function bikeSVG(lw){
  const maxW=Math.max(...Object.values(lw),1);
  const spots=[
    {loc:"Lenkertasche",x:145,y:72,a:"end"},
    {loc:"Rack vorn",x:105,y:155,a:"end"},
    {loc:"Gabeltasche links",x:72,y:195,a:"end"},
    {loc:"Gabeltasche rechts",x:120,y:218,a:"end"},
    {loc:"Oberrohrtasche",x:230,y:88,a:"middle"},
    {loc:"Rahmentasche",x:230,y:148,a:"middle"},
    {loc:"Arschrakete",x:360,y:105,a:"start"},
    {loc:"Gepäckträger",x:358,y:148,a:"start"},
    {loc:"Packtasche hinten links",x:370,y:192,a:"start"},
    {loc:"Packtasche hinten rechts",x:370,y:222,a:"start"},
    {loc:"Rucksack",x:230,y:35,a:"middle"},
    {loc:"Am Mann/Frau",x:280,y:35,a:"start"},
  ];
  let circles='';
  spots.forEach(s=>{
    const w=lw[s.loc]||0;if(!w)return;
    const r=Math.max(8,8+14*(w/maxW));
    const col=LOC_COLORS[s.loc];
    const op=0.3+0.5*(w/maxW);
    const label=s.loc.replace("Packtasche hinten ","PT h. ").replace("Gabeltasche ","GT ");
    circles+=`<circle cx="${s.x}" cy="${s.y}" r="${r}" fill="${col}" opacity="${op*0.7}"/>`;
    circles+=`<text x="${s.x}" y="${s.y-r-4}" text-anchor="${s.a}" fill="${col}" font-size="9" font-weight="700" opacity="0.95">${label}</text>`;
    circles+=`<text x="${s.x}" y="${s.y+4}" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">${w>=1000?(w/1000).toFixed(1)+'k':w}</text>`;
  });
  return `<svg viewBox="0 0 480 280" style="width:100%;max-width:520px">
<circle cx="365" cy="195" r="55" fill="none" stroke="#555" stroke-width="3"/>
<circle cx="365" cy="195" r="4" fill="#888"/>
<circle cx="115" cy="195" r="55" fill="none" stroke="#555" stroke-width="3"/>
<circle cx="115" cy="195" r="4" fill="#888"/>
<polyline points="175,95 240,180 365,195" fill="none" stroke="#777" stroke-width="4" stroke-linejoin="round"/>
<polyline points="175,95 300,95 365,195" fill="none" stroke="#777" stroke-width="4" stroke-linejoin="round"/>
<line x1="300" y1="95" x2="240" y2="180" stroke="#777" stroke-width="3"/>
<line x1="175" y1="95" x2="155" y2="75" stroke="#777" stroke-width="4"/>
<line x1="155" y1="75" x2="115" y2="195" stroke="#777" stroke-width="3"/>
<line x1="300" y1="95" x2="310" y2="70" stroke="#777" stroke-width="3"/>
<line x1="295" y1="70" x2="325" y2="70" stroke="#777" stroke-width="5" stroke-linecap="round"/>
<line x1="145" y1="70" x2="170" y2="80" stroke="#777" stroke-width="4" stroke-linecap="round"/>
<line x1="300" y1="120" x2="380" y2="150" stroke="#666" stroke-width="2.5"/>
<line x1="355" y1="150" x2="385" y2="150" stroke="#666" stroke-width="2.5"/>
<line x1="140" y1="120" x2="105" y2="155" stroke="#666" stroke-width="2"/>
<line x1="90" y1="155" x2="120" y2="155" stroke="#666" stroke-width="2"/>
${circles}</svg>`;
}

<select id="mi-loc">${locOptions(state.newItem.location)}</select>
<button class="btn-primary" onclick="syncNewItem();addItem()">Hinzufügen</button>
</div>`;
  } else if(m.type==='addCat'){
    inner=`
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
<h3 style="font-size:17px;font-weight:700;color:#f0f0f0">Neue Kategorie</h3>
<button onclick="state.modal=null;render()" style="background:none;border:none;color:#888;font-size:22px;cursor:pointer">✕</button>
</div>
<div style="display:flex;flex-direction:column;gap:12px">
<input id="mc-name" type="text" placeholder="Kategoriename" value="${esc(state.newCatName)}">
<button class="btn-primary" onclick="state.newCatName=document.getElementById('mc-name').value;addCategory()">Erstellen</button>
</div>`;
  } else if(m.type==='editItem'&&m.item){
    inner=`
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
<h3 style="font-size:17px;font-weight:700;color:#f0f0f0">Gegenstand bearbeiten</h3>
<button onclick="state.modal=null;render()" style="background:none;border:none;color:#888;font-size:22px;cursor:pointer">✕</button>
</div>
<div style="display:flex;flex-direction:column;gap:12px">
<input id="me-name" type="text" value="${esc(m.item.name)}">
<input id="me-weight" type="number" value="${m.item.weight}">
<select id="me-loc">${locOptions(m.item.location)}</select>
<button class="btn-primary" onclick="syncEditItem();saveEditItem()">Speichern</button>
</div>`;
  }
  return `<div class="modal-overlay open" id="modal" onclick="if(event.target===this){state.modal=null;render()}"><div class="modal-box" onclick="event.stopPropagation()">${inner}</div></div>`;
}
function syncNewItem(){
  state.newItem.name=document.getElementById('mi-name')?.value||'';
  state.newItem.weight=document.getElementById('mi-weight')?.value||'';
  state.newItem.location=document.getElementById('mi-loc')?.value||PACK_LOCATIONS[0];
}
function syncEditItem(){
  if(!state.modal||!state.modal.item)return;
  state.modal.item.name=document.getElementById('me-name')?.value||'';
  state.modal.item.weight=parseInt(document.getElementById('me-weight')?.value)||0;
  state.modal.item.location=document.getElementById('me-loc')?.value||PACK_LOCATIONS[0];
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── Render ──
function render(){
  const tw=getTotalWeight(),tp=getTotalPacked(),ai=getAllItemsCount();
  const lw=getLocationWeights(),li=getLocationItems();
  const total=tw+state.bikeWeight+state.bodyWeight;
  const search=state.search.toLowerCase();

  let cats=state.categories;
  if(search){
    cats=cats.map(c=>({...c,items:c.items.filter(i=>i.name.toLowerCase().includes(search))})).filter(c=>c.items.length>0);
  }

  let html=`
<div style="max-width:480px;margin:0 auto;position:relative;padding-bottom:env(safe-area-inset-bottom)">
<div style="position:absolute;top:-120px;right:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(232,89,79,0.12) 0%,transparent 70%);pointer-events:none"></div>
<div style="padding:20px 20px 0;position:relative;z-index:1">
<!-- Header -->
<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
<span style="font-size:26px">🚲</span>
<h1 style="font-size:24px;font-weight:800;letter-spacing:-0.04em;background:linear-gradient(135deg,#E8594F,#F39C12);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">PackRad</h1>
</div>
<p style="margin:2px 0 16px;font-size:12px;color:#666;letter-spacing:0.08em;text-transform:uppercase">Bikepacking Packliste</p>

<!-- Stats -->
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
<div class="stat-box">
<div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Gepäck</div>
<div class="val" style="font-size:20px;font-weight:800;letter-spacing:-0.03em">${(tw/1000).toFixed(1)} kg</div>
<div style="font-size:10px;color:var(--text3);margin-top:2px">${tp} / ${ai}</div>
</div>
<div class="stat-box">
<div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Fahrrad</div>
<div class="val" style="font-size:20px;font-weight:800;letter-spacing:-0.03em">${(state.bikeWeight/1000).toFixed(1)} kg</div>
</div>
<div class="stat-box">
<div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">Gesamt</div>
<div class="val" style="font-size:20px;font-weight:800;letter-spacing:-0.03em;color:var(--accent)">${(total/1000).toFixed(1)} kg</div>
<div style="font-size:10px;color:var(--text3);margin-top:2px">mit Fahrer</div>
</div>
</div>

<!-- Tabs -->
<div class="tab-bar">
<button class="tab-btn ${state.view==='list'?'active':''}" onclick="state.view='list';render()">📋 Liste</button>
<button class="tab-btn ${state.view==='bike'?'active':''}" onclick="state.view='bike';render()">🚲 Rad</button>
<button class="tab-btn ${state.view==='locations'?'active':''}" onclick="state.view='locations';render()">📍 Orte</button>
</div>

<!-- Search -->
<div style="position:relative;margin-bottom:12px">
<span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:#666">🔍</span>
<input type="text" id="search-input" placeholder="Gegenstand suchen..." value="${esc(state.search)}" style="padding-left:36px"
oninput="state.search=this.value;render()">
</div>
</div>`;

  // ═══ LIST VIEW ═══
  if(state.view==='list'){
    html+='<div style="padding:0 20px 100px">';
    cats.forEach(cat=>{
      const cw=cat.items.filter(i=>i.packed).reduce((a,i)=>a+(i.weight||0),0);
      const cp=cat.items.filter(i=>i.packed).length;
      html+=`<div class="cat-card ${cat.enabled?'':'disabled'}">
<div class="cat-header">
<button class="check-cat ${cat.enabled?'on':''}" onclick="toggleCategory('${cat.id}')">${cat.enabled?'✓':''}</button>
<div style="flex:1">
<div style="font-weight:700;font-size:14px;letter-spacing:-0.01em">${esc(cat.name)}</div>
<div style="font-size:11px;color:var(--text2);margin-top:1px">${cp}/${cat.items.length} gepackt · ${(cw/1000).toFixed(1)} kg</div>
</div>
<div style="display:flex;gap:4px">
<button class="btn-ghost" style="padding:4px 8px;font-size:11px" onclick="packAll('${cat.id}')">✓ All</button>
<button class="btn-ghost" style="padding:4px 8px;font-size:11px" onclick="unpackAll('${cat.id}')">✗ All</button>
<button class="btn-ghost" style="padding:4px 8px;font-size:14px" onclick="state.modal={type:'addItem',catId:'${cat.id}'};render()">+</button>
<button class="btn-ghost" style="padding:4px 8px;font-size:12px;color:var(--accent)" onclick="if(confirm('Kategorie \\'${esc(cat.name)}\\' löschen?'))deleteCategory('${cat.id}')">🗑</button>
</div>
</div>`;
      cat.items.forEach(it=>{
        const col=LOC_COLORS[it.location]||'#888';
        html+=`<div class="item-row">
<button class="check-item ${it.packed?'on':''}" onclick="togglePacked('${cat.id}','${it.id}')">${it.packed?'✓':''}</button>
<div style="flex:1;min-width:0;cursor:pointer" onclick="state.modal={type:'editItem',catId:'${cat.id}',item:{id:'${it.id}',name:'${esc(it.name).replace(/'/g,"\\'")}',weight:${it.weight},location:'${it.location}'}};render()">
<div style="font-size:13px;font-weight:500;color:${it.packed?'#e8e8e8':'#999'}">${esc(it.name)}</div>
<span class="loc-tag" style="background:${col}22;color:${col}">${it.location}</span>
</div>
<div style="font-size:13px;font-weight:700;color:#888;white-space:nowrap">${fmtW(it.weight)}</div>
<button onclick="if(confirm('${esc(it.name).replace(/'/g,"\\'")} löschen?'))deleteItem('${cat.id}','${it.id}')" style="background:none;border:none;color:#555;font-size:14px;cursor:pointer;padding:2px 4px">×</button>
</div>`;
      });
      html+='</div>';
    });
    html+=`<button class="btn-primary" style="width:100%;padding:14px;font-size:15px;border-radius:14px;margin-top:8px" onclick="state.modal={type:'addCat'};render()">+ Neue Kategorie</button>`;

    // Export/Import/Reset
    html+=`<div class="export-section" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:20px">
<button class="btn-ghost" style="font-size:12px" onclick="exportJSON()">💾 Backup</button>
<button class="btn-ghost" style="font-size:12px" onclick="importJSON()">📂 Importieren</button>
<button class="btn-ghost" style="font-size:12px;color:var(--accent)" onclick="resetData()">🔄 Reset</button>
</div>`;
    html+='</div>';
  }

  // ═══ BIKE VIEW ═══
  if(state.view==='bike'){
    html+=`<div style="padding:0 20px 100px">
<div style="background:var(--card);border-radius:16px;padding:16px;border:1px solid var(--border);margin-bottom:16px">
${bikeSVG(lw)}
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;
    PACK_LOCATIONS.forEach(loc=>{
      const w=lw[loc]||0;const items=li[loc]||[];
      if(!w)return;
      html+=`<div class="bike-loc-card" style="border-left:3px solid ${LOC_COLORS[loc]}">
<div style="font-size:11px;font-weight:700;color:${LOC_COLORS[loc]};margin-bottom:4px">${loc}</div>
<div style="font-size:16px;font-weight:800;color:#f0f0f0;margin-bottom:4px">${(w/1000).toFixed(1)} kg</div>
<div style="font-size:10px;color:var(--text2)">${items.length} ${items.length===1?'Teil':'Teile'}</div>
</div>`;
    });
    html+=`</div>
<div style="margin-top:20px;display:flex;gap:10px">
<div style="flex:1">
<label style="font-size:11px;color:var(--text2);display:block;margin-bottom:4px">Fahrradgewicht (g)</label>
<input type="number" id="bike-w" value="${state.bikeWeight}" onchange="state.bikeWeight=parseInt(this.value)||0;render()">
</div>
<div style="flex:1">
<label style="font-size:11px;color:var(--text2);display:block;margin-bottom:4px">Körpergewicht (g)</label>
<input type="number" id="body-w" value="${state.bodyWeight}" onchange="state.bodyWeight=parseInt(this.value)||0;render()">
</div>
</div></div>`;
  }

  // ═══ LOCATIONS VIEW ═══
  if(state.view==='locations'){
    html+='<div style="padding:0 20px 100px">';
    PACK_LOCATIONS.forEach(loc=>{
      const items=li[loc]||[];if(!items.length)return;
      const w=lw[loc]||0;
      html+=`<div class="loc-card">
<div class="loc-header" style="border-left:4px solid ${LOC_COLORS[loc]}">
<div>
<div style="font-weight:700;font-size:14px;color:${LOC_COLORS[loc]}">${loc}</div>
<div style="font-size:11px;color:var(--text2)">${items.length} Teile</div>
</div>
<div style="font-size:18px;font-weight:800;color:#f0f0f0">${(w/1000).toFixed(1)} kg</div>
</div>`;
      items.forEach(it=>{
        html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,0.02)">
<div>
<div style="font-size:13px;color:#ddd">${esc(it.name)}</div>
<div style="font-size:10px;color:#666">${esc(it.category)}</div>
</div>
<div style="font-size:12px;font-weight:600;color:#888">${fmtW(it.weight)}</div>
</div>`;
      });
      html+='</div>';
    });
    html+='</div>';
  }

  html+='</div>'; // close max-width wrapper
  html+=modalHTML();

  document.getElementById('app').innerHTML=html;

  // Refocus search if it was active
  if(state.search){
    const si=document.getElementById('search-input');
    if(si){si.focus();si.setSelectionRange(si.value.length,si.value.length)}
  }
  // Focus modal inputs
  if(state.modal){
    setTimeout(()=>{
      const f=document.getElementById('mi-name')||document.getElementById('mc-name')||document.getElementById('me-name');
      if(f)f.focus();
    },50);
  }
}

// ── Init ──
loadState();
render();
</script>
</body>
</html>
